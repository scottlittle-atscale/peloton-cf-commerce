unique_name: dim_date
object_type: dataset
label: dim_date
description: Daily date dimension with a fiscal (July-June) and a Gregorian calendar, plus prior-year parallel-period keys.
connection_id: connection_connected_fitness
table: dim_date
columns:
- name: date_key
  data_type: long
- name: full_date
  data_type: date
- name: day_of_month
  data_type: long
- name: month_number
  data_type: long
- name: month_name
  data_type: string
- name: month_start_key
  data_type: long
- name: calendar_quarter
  data_type: long
- name: calendar_year
  data_type: long
- name: fiscal_year
  data_type: long
- name: fiscal_quarter
  data_type: long
- name: fiscal_year_label
  data_type: string
- name: fiscal_period_label
  data_type: string
- name: is_holiday_season
  data_type: boolean
- name: prior_fiscal_year_num
  data_type: long
  sql: fiscal_year - 1
  dialects:
  - dialect: BigQuery
    sql: fiscal_year - 1
- name: prior_year_num
  data_type: long
  sql: calendar_year - 1
  dialects:
  - dialect: BigQuery
    sql: calendar_year - 1
- name: month_year_label
  data_type: string
  sql: CONCAT(month_name, ' ', CAST(calendar_year AS STRING))
  dialects:
  - dialect: BigQuery
    sql: CONCAT(month_name, ' ', CAST(calendar_year AS STRING))
- name: cal_quarter_label
  data_type: string
  sql: CONCAT('Q', CAST(calendar_quarter AS STRING), ' ', CAST(calendar_year AS STRING))
  dialects:
  - dialect: BigQuery
    sql: CONCAT('Q', CAST(calendar_quarter AS STRING), ' ', CAST(calendar_year AS STRING))
- name: cal_year_name
  data_type: string
  sql: CAST(calendar_year AS STRING)
  dialects:
  - dialect: BigQuery
    sql: CAST(calendar_year AS STRING)
