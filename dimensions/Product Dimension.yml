unique_name: Product Dimension
object_type: dimension
label: Product Dimension
description: Product line > category > product, with condition (new/refurbished).
type: standard
hierarchies:
- unique_name: Product Hierarchy
  label: Product Hierarchy
  folder: Product
  levels:
  - unique_name: Product Line
  - unique_name: Product Category
  - unique_name: Product
    secondary_attributes:
    - unique_name: Condition
      label: Condition
      description: New / Refurbished / N/A.
      dataset: dim_product
      folder: Product
      key_columns:
      - condition
      name_column: condition
    - unique_name: Refurbished Flag
      label: Refurbished Flag
      description: True for refurbished SKUs.
      dataset: dim_product
      folder: Product
      key_columns:
      - is_refurbished
      name_column: is_refurbished
level_attributes:
- unique_name: Product Line
  label: Product Line
  description: Connected Fitness / Accessories / Apparel / Commercial.
  dataset: dim_product
  key_columns:
  - product_line
  name_column: product_line
- unique_name: Product Category
  label: Product Category
  description: Bike / Tread / Row / Accessory / Apparel / Precor.
  dataset: dim_product
  key_columns:
  - product_line
  - product_category
  name_column: product_category
- unique_name: Product
  label: Product
  description: Product SKU (model and condition).
  dataset: dim_product
  is_unique_key: true
  key_columns:
  - product_key
  name_column: product_display_name
